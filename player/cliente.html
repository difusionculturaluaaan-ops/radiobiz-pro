<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadioBiz - Reproductor</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
[data-theme="dark"]{
  --bg:#060608;--s1:#0d0d12;--s2:#14141c;--s3:#1c1c27;--s4:#232330;
  --border:#ffffff09;--border2:#ffffff14;--border3:#ffffff24;
  --accent:#7c6dfa;--accent2:#c8f135;--warn:#ff6b35;--info:#38bdf8;
  --green:#34d399;--text:#eeeef5;--text2:#b0b0cc;--muted:#5a5a78;--muted2:#3a3a52;
  --shadow:0 4px 24px #00000055;--glow1:#7c6dfa0a;--glow2:#c8f1350a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:16px;font-weight:500;display:flex;flex-direction:column;position:relative;transition:background .35s,color .35s;overflow:hidden;}
@media(max-width:720px){body{overflow-y:auto;overflow-x:hidden;}}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 0%,var(--glow1) 0%,transparent 60%),radial-gradient(ellipse 40% 30% at 80% 100%,var(--glow2) 0%,transparent 60%);pointer-events:none;z-index:0;}

/* PIN */
#pinScreen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;transition:background .35s;}
.pin-brand{display:flex;flex-direction:column;align-items:center;gap:7px;}
.logo-mark{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:3px;box-shadow:0 0 30px var(--accent)44;}
.pin-brand h1{font-size:1.4rem;font-weight:800;letter-spacing:-.5px;}
.pin-brand h1 span{color:var(--accent2);}
.pin-brand .client-badge{font-size:.78rem;font-weight:700;color:var(--text2);background:var(--s2);border:1px solid var(--border2);border-radius:99px;padding:4px 14px;margin-top:2px;}
.pin-brand p{font-size:.72rem;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.pin-card{background:var(--s1);border:1px solid var(--border2);border-radius:24px;padding:32px 28px;width:min(340px,92vw);box-shadow:var(--shadow);}
.pin-card h2{font-size:1rem;font-weight:700;text-align:center;margin-bottom:4px;}
.pin-card>p{font-size:.74rem;color:var(--muted);font-family:'JetBrains Mono',monospace;text-align:center;margin-bottom:22px;}
.pin-dots{display:flex;justify-content:center;gap:13px;margin-bottom:22px;}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--s3);border:2px solid var(--border2);transition:all .2s;}
.pin-dot.on{background:var(--accent);border-color:var(--accent);box-shadow:0 0 10px var(--accent)55;}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.pk{background:var(--s2);border:1px solid var(--border2);border-radius:12px;padding:15px 8px;font-size:1.2rem;font-weight:700;cursor:pointer;color:var(--text);text-align:center;transition:all .15s;font-family:'Outfit',sans-serif;}
.pk:hover{background:var(--s3);}
.pk:active{transform:scale(.9);}
.pk.ok{background:linear-gradient(135deg,var(--accent),#6358e8);color:#fff;border-color:var(--accent);}
.pin-err{font-size:.72rem;font-weight:600;color:var(--warn);font-family:'JetBrains Mono',monospace;text-align:center;min-height:14px;margin-top:10px;}
.pin-hint{font-size:.64rem;color:var(--muted2);font-family:'JetBrains Mono',monospace;text-align:center;margin-top:12px;}
.theme-btn{background:var(--s2);border:1px solid var(--border2);border-radius:99px;padding:6px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:600;color:var(--text2);transition:all .2s;}
.theme-btn:hover{border-color:var(--border3);color:var(--text);}

/* APP */
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;opacity:0;transition:opacity .4s;}
#app.show{opacity:1;}
@media(max-width:720px){#app{height:auto;min-height:100dvh;}}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 22px;border-bottom:1px solid var(--border2);flex-shrink:0;background:var(--bg)dd;backdrop-filter:blur(14px);transition:background .35s;position:sticky;top:0;z-index:10;}
.tb-brand{display:flex;align-items:center;gap:8px;min-width:0;flex:1;}
.tb-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:.85rem;box-shadow:0 0 12px var(--accent)33;flex-shrink:0;}
.tb-name{font-size:.95rem;font-weight:800;letter-spacing:-.3px;white-space:nowrap;}
.tb-name span{color:var(--accent2);}
.tb-ver{font-size:.52rem;background:var(--accent)22;color:var(--accent);border:1px solid var(--accent)33;border-radius:99px;padding:1px 7px;font-family:'JetBrains Mono',monospace;font-weight:600;margin-left:2px;flex-shrink:0;}
.tb-client{font-size:.7rem;font-weight:700;color:var(--text2);background:var(--s2);border:1px solid var(--border2);border-radius:99px;padding:3px 10px;margin-left:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;}
.tb-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}

/* MAIN CONTAINER */
.container{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:20px;}
@media(max-width:720px){.container{padding:14px;}}

/* PLAYER */
.player-card{background:var(--s1);border:1px solid var(--border2);border-radius:22px;padding:24px;position:relative;overflow:hidden;transition:border-color .4s,background .35s,box-shadow .35s;box-shadow:var(--shadow);width:100%;max-width:500px;}
.player-card::after{content:'';position:absolute;top:-80px;right:-80px;width:260px;height:260px;background:radial-gradient(circle,var(--accent)0d 0%,transparent 70%);pointer-events:none;transition:all .5s;}
.player-card.ad-mode{border-color:var(--warn)40;}
.player-card.ad-mode::after{background:radial-gradient(circle,var(--warn)1a 0%,transparent 70%);}

.track-row{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.vinyl{width:66px;height:66px;border-radius:50%;background:conic-gradient(from 0deg,var(--s4),var(--s2),var(--s3),var(--s4));border:3px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;position:relative;transition:all .4s;}
.vinyl::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:var(--bg);border:3px solid var(--s3);transition:background .35s;}
.vinyl.spin{animation:vspin 5s linear infinite;}
@keyframes vspin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.track-meta h2{font-size:1.05rem;font-weight:800;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:320px;}
.track-meta p{font-size:.72rem;font-weight:600;color:var(--muted);font-family:'JetBrains Mono',monospace;}

.prog-bar{width:100%;height:4px;background:var(--s3);border-radius:99px;overflow:hidden;margin-bottom:8px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .5s linear;width:0%;}
.time-row{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:.63rem;font-weight:600;color:var(--muted);margin-bottom:18px;}

.ctrl-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:15px;}
.play-btn{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#6358e8);color:#fff;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:1.15rem;font-weight:700;box-shadow:0 0 22px var(--accent)55;}
.play-btn:hover{transform:scale(1.08);}

.vol-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.vol-row label{font-size:.66rem;font-weight:700;color:var(--muted);width:70px;flex-shrink:0;font-family:'JetBrains Mono',monospace;}
input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer;}
.vv{font-family:'JetBrains Mono',monospace;font-size:.63rem;font-weight:600;color:var(--muted);width:30px;text-align:right;}

.next-ad{display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--s2);border:1px solid var(--border2);border-radius:10px;margin-top:11px;}
.next-ad .nl{font-size:.62rem;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--muted);flex:1;text-transform:uppercase;letter-spacing:1px;}
.next-ad .nt{font-family:'JetBrains Mono',monospace;font-size:.88rem;font-weight:600;color:#f59e0b;}

/* SOURCE SELECTOR */
.source-section{margin-top:18px;padding-top:18px;border-top:1px solid var(--border2);}
.sl{font-family:'JetBrains Mono',monospace;font-size:.63rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:11px;display:flex;align-items:center;gap:8px;}
.sl::after{content:'';flex:1;height:1px;background:var(--border2);}
.tabs{display:flex;gap:6px;margin-bottom:12px;}
.tab{padding:6px 12px;border-radius:8px;background:var(--s2);border:1px solid var(--border2);color:var(--muted);font-size:.72rem;font-weight:700;cursor:pointer;transition:all .2s;}
.tab.on{background:var(--accent)22;border-color:var(--accent)55;color:var(--accent);}
.tab:hover:not(.on){color:var(--text);}
.panel{display:none;}
.panel.on{display:block;}
.inp{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.76rem;font-weight:600;padding:9px 12px;outline:none;transition:border-color .2s;margin-bottom:7px;}
.inp:focus{border-color:var(--accent)70;}
.row{display:flex;gap:7px;align-items:center;}
.btn-s{background:var(--s2);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.74rem;font-weight:700;padding:9px 13px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-s:hover{background:var(--s3);}
.btn-s.a{background:var(--accent)22;border-color:var(--accent)55;color:var(--accent);}
.btn-s.a:hover{background:var(--accent)35;}
.presets{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;}
.preset{background:var(--s2);border:1px solid var(--border2);border-radius:7px;color:var(--muted);font-size:.68rem;font-weight:700;font-family:'JetBrains Mono',monospace;padding:5px 9px;cursor:pointer;transition:all .2s;}
.preset:hover{color:var(--text);}
.preset:active{background:var(--accent)22;color:var(--accent);}

@media(max-width:720px){
  .topbar{padding:10px 12px;}
  .tb-client{max-width:100px;}
  .player-card{padding:18px;margin:0;}
  .track-row{gap:14px;margin-bottom:16px;}
  .vinyl{width:58px;height:58px;font-size:1.2rem;}
  .track-meta h2{font-size:.92rem;max-width:calc(100vw - 140px);}
  .track-meta p{font-size:.66rem;}
  .time-row{margin-bottom:16px;font-size:.65rem;}
  .ctrl-row{gap:16px;margin-bottom:16px;}
  .play-btn{width:52px;height:52px;font-size:1.2rem;min-height:52px;}
  .vol-row{gap:12px;margin-bottom:12px;}
  .vol-row label{width:auto;font-size:.66rem;}
  input[type=range]{height:24px;min-height:44px;cursor:pointer;}
}
</style>
</head>
<body>

<!-- PIN -->
<div id="pinScreen">
  <div class="pin-brand">
    <div class="logo-mark">📻</div>
    <h1>Radio<span>Biz</span> Pro</h1>
    <div class="client-badge" id="pinClientBadge">Reproductor</div>
    <p>Sistema de audio para negocios</p>
  </div>
  <button class="theme-btn" onclick="toggleTheme()"><span id="pinTI">☀️</span><span id="pinTT">Modo claro</span></button>
  <div class="pin-card">
    <h2>Acceso al reproductor</h2>
    <p>Ingresa tu PIN de acceso</p>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-grid">
      <button class="pk" onclick="pk('1')">1</button><button class="pk" onclick="pk('2')">2</button><button class="pk" onclick="pk('3')">3</button>
      <button class="pk" onclick="pk('4')">4</button><button class="pk" onclick="pk('5')">5</button><button class="pk" onclick="pk('6')">6</button>
      <button class="pk" onclick="pk('7')">7</button><button class="pk" onclick="pk('8')">8</button><button class="pk" onclick="pk('9')">9</button>
      <button class="pk" onclick="pb()">⌫</button><button class="pk" onclick="pk('0')">0</button><button class="pk ok" onclick="ps()">✓</button>
    </div>
    <div class="pin-err" id="pinErr"></div>
    <p class="pin-hint">Contacta a RadioBiz para tu PIN</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-brand">
      <div class="tb-mark">📻</div>
      <span class="tb-name">Radio<span>Biz</span> Pro</span>
      <span class="tb-ver">v5</span>
      <span class="tb-client" id="tbClient">—</span>
    </div>
    <div class="tb-right">
      <button class="theme-btn" onclick="toggleTheme()"><span id="appTI">☀️</span><span id="appTT">Claro</span></button>
    </div>
  </div>

  <div class="container">
    <div class="player-card" id="playerCard">
      <!-- TRACK -->
      <div class="track-row">
        <div class="vinyl" id="vinyl">🎵</div>
        <div class="track-meta">
          <h2 id="trackName">Sin pista cargada</h2>
          <p id="trackSrc">Selecciona una fuente</p>
        </div>
      </div>

      <!-- PROGRESS -->
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
      <div class="time-row"><span id="tEl">0:00</span><span id="tDur">0:00</span></div>

      <!-- PLAY/PAUSE -->
      <div class="ctrl-row">
        <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
      </div>

      <!-- VOLUME -->
      <div class="vol-row">
        <label>Volumen</label>
        <input type="range" id="volM" min="0" max="100" value="80" oninput="setVol(this.value)">
        <span class="vv" id="vMv">80%</span>
      </div>

      <!-- NEXT AD -->
      <div class="next-ad">
        <span class="nl">⏳ Próximo anuncio</span>
        <span class="nt" id="nextAdTxt">--:--</span>
      </div>

      <!-- SOURCE SELECTOR -->
      <div class="source-section">
        <div class="sl">🎧 Fuente de música</div>
        <div class="tabs">
          <button class="tab on" onclick="switchTab('radio')" id="tab-radio">📡 Radio</button>
          <button class="tab" onclick="switchTab('folder')" id="tab-folder">📁 Carpeta</button>
          <button class="tab" onclick="switchTab('drive')" id="tab-drive">☁️ Drive</button>
        </div>

        <!-- RADIO PANEL -->
        <div class="panel on" id="panel-radio">
          <div class="presets">
            <button class="preset" onclick="setPreset('https://ice1.somafm.com/groovesalad-256-mp3','Groove Salad')">🌱 Ambient</button>
            <button class="preset" onclick="setPreset('https://ice1.somafm.com/dronezone-256-mp3','Drone Zone')">🌙 Chill</button>
            <button class="preset" onclick="setPreset('https://ice1.somafm.com/seventies-128-mp3','70s')">🕺 70s</button>
            <button class="preset" onclick="setPreset('https://ice1.somafm.com/illstreet-128-mp3','Rock')">🎸 Rock</button>
          </div>
          <div class="row">
            <input class="inp" type="url" id="radioUrl" placeholder="https://stream.mp3">
            <button class="btn-s" onclick="loadRadio()">Cargar</button>
          </div>
        </div>

        <!-- FOLDER PANEL -->
        <div class="panel" id="panel-folder">
          <input type="file" id="fileIn" accept="audio/*" multiple style="display:none" onchange="handleFiles(event)">
          <button class="btn-s a" onclick="document.getElementById('fileIn').click()" style="width:100%;">+ Agregar MP3</button>
        </div>

        <!-- DRIVE PANEL -->
        <div class="panel" id="panel-drive">
          <div style="font-size:.6rem;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;">ID de carpeta Drive</div>
          <div class="row">
            <input class="inp" type="text" id="musicFolderId" placeholder="ID de carpeta..." style="flex:1;font-size:.7rem;margin-bottom:0;">
            <button class="btn-s a" onclick="loadDriveMusic()">🔍</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<audio id="musicAudio" onended="onMusicEnd()" ontimeupdate="onTimeUpdate()" onloadedmetadata="onMeta()"></audio>
<audio id="adAudio" onended="onAdEnd()"></audio>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getDatabase, ref, get, set, update, remove, onValue } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyDgE9XssX6VT1SxQuDzR-FOnq4S7FE3Zcw",
  authDomain: "proradiobiz.firebaseapp.com",
  databaseURL: "https://proradiobiz-default-rtdb.firebaseio.com",
  projectId: "proradiobiz",
  storageBucket: "proradiobiz.firebasestorage.app",
  messagingSenderId: "601173283890",
  appId: "1:601173283890:web:ee0af646f3b06e3878d82b"
};
const fbApp = initializeApp(firebaseConfig);
const fbDb = getDatabase(fbApp);
const fbAuth = getAuth(fbApp);
const authReady = signInAnonymously(fbAuth).catch(() => {});

const SESSION_ID = 'sess_' + Math.random().toString(36).substring(2,10);
let fbClientId = null;

window.fbValidateClient = async (clientId, code) => {
  await authReady;
  try {
    const snap = await get(ref(fbDb, 'clients/'+clientId));
    if(!snap.exists()) return { valid: false, reason: 'Cliente no encontrado' };
    const c = snap.val();
    if(c.blocked) return { valid: false, reason: 'Servicio suspendido' };
    if(c.code !== code) return { valid: false, reason: 'Código inválido' };
    return { valid: true, client: c };
  } catch(e) { return { valid: true }; }
};

window.fbRegisterSession = async (clientId) => {
  await authReady;
  fbClientId = clientId;
  await set(ref(fbDb, 'sessions/'+SESSION_ID), {
    clientId, lastPing: Date.now(), userAgent: navigator.userAgent.substring(0,80)
  });
  setInterval(async () => {
    await update(ref(fbDb, 'sessions/'+SESSION_ID), { lastPing: Date.now() });
  }, 90000);
  window.addEventListener('beforeunload', () => {
    remove(ref(fbDb, 'sessions/'+SESSION_ID));
  });
};

window.fbListenBlock = (clientId, callback) => {
  onValue(ref(fbDb, 'clients/'+clientId+'/blocked'), snap => {
    if(snap.exists() && snap.val() === true) callback();
  });
};
</script>

<script>
const API_KEY = 'AIzaSyDpXD_7H5xhVZhb_y3DzXQ212xpNrs_pZw';
const DEFAULT_FOLDER_ID = '1tIXvw-hD2Vp2uDr-u5c919dxmbroPpi9';

function getParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    nombre:  p.get('nombre')  || null,
    folder:  p.get('folder')  || null,
    radio:   p.get('radio')   || null,
    pin:     p.get('pin')     || null,
    intervalo: p.get('intervalo') || null,
    fade:    p.get('fade')    || null,
    musicfolder: p.get('musicfolder') || null,
    code:    p.get('code')    || null,
    cid:     p.get('cid')     || null,
  };
}

const PARAMS = getParams();
let PIN = PARAMS.pin || localStorage.getItem('rbz_pin_v5') || '1234';
let pinBuf = '';
let playing = false;
let adIntervalMs = (PARAMS.intervalo ? parseInt(PARAMS.intervalo) : 10) * 60000;
let adTimer = null, cdTimer = null, nextAdAt = null;
let musicFiles = [], curTrack = -1;
let spotFiles = [], spotIndex = 0;
let driveMusicFiles = [];
let currentFolderId = PARAMS.folder || localStorage.getItem('rbz_folder_v5') || DEFAULT_FOLDER_ID;
let clientName = PARAMS.nombre || localStorage.getItem('rbz_bizname_v5') || 'Mi Negocio';

const musicAudio = document.getElementById('musicAudio');
const adAudio = document.getElementById('adAudio');

window.onload = async () => {
  initTheme();

  if(PARAMS.cid && PARAMS.code && window.fbValidateClient) {
    const result = await window.fbValidateClient(PARAMS.cid, PARAMS.code);
    if(!result.valid) {
      showError(result.reason || 'Acceso no autorizado');
      return;
    }
    if(window.fbRegisterSession) await window.fbRegisterSession(PARAMS.cid);
    if(window.fbListenBlock) window.fbListenBlock(PARAMS.cid, () => {
      if(playing) pauseMusic();
      showError('Servicio suspendido');
    });
  }

  applyParams();
  document.addEventListener('keydown', e => {
    if(e.key>='0'&&e.key<='9') pk(e.key);
    if(e.key==='Enter') ps();
    if(e.key==='Backspace') pb();
  });
};

function applyParams() {
  if(PARAMS.pin) PIN = PARAMS.pin;
  if(PARAMS.nombre) clientName = PARAMS.nombre;

  // Load music source - prioritize radio, then Drive music folder
  if(PARAMS.radio) {
    setPreset(PARAMS.radio, 'Radio');
  } else if(PARAMS.musicfolder) {
    // Auto-load Drive music folder
    console.log('🎵 Precargando carpeta de música:', PARAMS.musicfolder);
    document.getElementById('musicFolderId').value = PARAMS.musicfolder;
    setTimeout(() => loadDriveMusic(PARAMS.musicfolder), 800);
  }

  // Load ad configuration
  if(PARAMS.intervalo) adIntervalMs = parseInt(PARAMS.intervalo) * 60000;

  // Load spot folder and schedule ads (don't block if it fails)
  if(PARAMS.folder) {
    loadSpots().catch(() => {
      console.log('Spots unavailable, continuing without them');
    }).finally(() => {
      if(adIntervalMs) scheduleAd();
    });
  }

  document.getElementById('tbClient').textContent = clientName;
}

function showError(msg) {
  document.getElementById('pinScreen').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.body.innerHTML = `<div style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--warn);text-align:center;font-family:'JetBrains Mono',monospace;"><div><div style="font-size:1.2rem;margin-bottom:10px;">❌</div><div>${msg}</div></div></div>`;
}

/* PIN SCREEN */
let pinAttempts = 0;
window.pk = (digit) => {
  if(pinBuf.length < 4) {
    pinBuf += digit;
    updatePinDots();
  }
};

window.pb = () => {
  pinBuf = pinBuf.slice(0, -1);
  updatePinDots();
};

async function hashPin(pin) {
  const data = new TextEncoder().encode(pin);
  const buf = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

window.ps = async () => {
  const entered = pinBuf;
  const isHashed = PIN && PIN.length === 64;
  const match = isHashed ? (await hashPin(entered) === PIN) : (entered === PIN);
  if(match) {
    document.getElementById('pinScreen').style.display = 'none';
    document.getElementById('app').classList.add('show');
    localStorage.setItem('rbz_pin_v5', PIN);
  } else {
    pinAttempts++;
    document.getElementById('pinErr').textContent = pinAttempts > 2 ? 'Múltiples intentos fallidos' : 'PIN incorrecto';
    pinBuf = '';
    updatePinDots();
  }
};

function updatePinDots() {
  for(let i=0; i<4; i++) {
    const dot = document.getElementById('pd'+i);
    if(i < pinBuf.length) {
      dot.classList.add('on');
    } else {
      dot.classList.remove('on');
    }
  }
  document.getElementById('pinErr').textContent = '';
}

/* THEME */
function initTheme() {
  const stored = localStorage.getItem('rbz_theme_v5');
  if(stored) document.documentElement.setAttribute('data-theme', stored);
}

window.toggleTheme = () => {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('rbz_theme_v5', next);
  updateThemeBtn();
};

function updateThemeBtn() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.getElementById('pinTI').textContent = isDark ? '☀️' : '🌙';
  document.getElementById('pinTT').textContent = isDark ? 'Modo claro' : 'Modo oscuro';
  document.getElementById('appTI').textContent = isDark ? '☀️' : '🌙';
  document.getElementById('appTT').textContent = isDark ? 'Claro' : 'Oscuro';
}

updateThemeBtn();

/* PLAYER */
window.togglePlay = () => {
  if(!musicAudio.src) {
    document.getElementById('pinErr').textContent = 'Carga una fuente primero';
    setTimeout(() => { document.getElementById('pinErr').textContent = ''; }, 3000);
    return;
  }
  if(playing) {
    pauseMusic();
  } else {
    if(!playing && spotFiles.length === 0) {
      loadSpots(); // Cargar spots en primer play
    }
    playMusic();
  }
};

function playMusic() {
  musicAudio.play();
  playing = true;
  document.getElementById('playBtn').textContent = '⏸';
  document.getElementById('vinyl').classList.add('spin');
  scheduleAd();
}

function pauseMusic() {
  musicAudio.pause();
  playing = false;
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('vinyl').classList.remove('spin');
  if(adTimer) clearTimeout(adTimer);
  if(cdTimer) clearInterval(cdTimer);
}

function onMusicEnd() {
  if(curMode === 'folder' && musicFiles.length > 0) {
    curTrack = (curTrack + 1) % musicFiles.length;
    musicAudio.src = URL.createObjectURL(musicFiles[curTrack]);
    if(playing) musicAudio.play();
  }
}

function onAdEnd() {
  musicAudio.play();
}

function onTimeUpdate() {
  if(musicAudio.duration) {
    const percent = (musicAudio.currentTime / musicAudio.duration) * 100;
    document.getElementById('progFill').style.width = percent + '%';
    document.getElementById('tEl').textContent = formatTime(musicAudio.currentTime);
  }
}

function onMeta() {
  document.getElementById('tDur').textContent = formatTime(musicAudio.duration);
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m + ':' + (s < 10 ? '0' : '') + s;
}

window.setVol = (val) => {
  musicAudio.volume = val / 100;
  adAudio.volume = val / 100;
  document.getElementById('vMv').textContent = val + '%';
  localStorage.setItem('rbz_vol_v5', val);
};

const savedVol = localStorage.getItem('rbz_vol_v5') || '80';
document.getElementById('volM').value = savedVol;
window.setVol(savedVol);

function scheduleAd() {
  if(adTimer) clearTimeout(adTimer);
  if(cdTimer) clearInterval(cdTimer);

  nextAdAt = Date.now() + adIntervalMs;
  adTimer = setTimeout(() => {
    if(playing) playAd();
  }, adIntervalMs);

  updateCountdown();
  cdTimer = setInterval(updateCountdown, 500);
}

function updateCountdown() {
  if(!nextAdAt) return;
  const remaining = Math.max(0, nextAdAt - Date.now());
  const mins = Math.floor(remaining / 60000);
  const secs = Math.floor((remaining % 60000) / 1000);
  document.getElementById('nextAdTxt').textContent =
    (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs;
}

async function loadSpots() {
  const folderId = PARAMS.folder || programming?.spotFolder;
  if(!folderId) return;

  try {
    // Load from client's folder (which is a sub-folder inside RadioBiz-Jingles)
    const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+(mimeType='audio/mpeg'+or+mimeType='audio/wav'+or+mimeType='audio/ogg'+or+mimeType='audio/mp4'+or+mimeType='audio/x-m4a')&key=${API_KEY}&fields=files(id,name)&orderBy=modifiedTime+desc`;
    const res = await fetch(url);

    if(!res.ok) {
      console.warn(`Spots loading failed (${res.status}), continuing without spots`);
      spotFiles = [];
      return;
    }

    const data = await res.json();
    spotFiles = (data.files || []).map(f => ({ id: f.id, name: f.name }));
    spotIndex = 0;

    if(spotFiles.length === 0) {
      console.warn(`⚠️ No spots found in folder ${folderId}`);
    } else {
      console.log(`✅ Loaded ${spotFiles.length} spots`);
    }
  } catch(e) {
    console.error('❌ Error loading spots:', e.message);
    spotFiles = [];
  }
}

function playAd() {
  if(!spotFiles || spotFiles.length === 0) {
    // No hay spots, reproducir música y reschedule
    playMusic();
    scheduleAd(); // Program next ad
    return;
  }

  // Reproducir siguiente spot
  const spot = spotFiles[spotIndex % spotFiles.length];

  // Use Google Drive API directly (same as V4)
  const streamUrl = `https://www.googleapis.com/drive/v3/files/${spot.id}?alt=media&key=${API_KEY}`;
  adAudio.src = streamUrl;
  adAudio.volume = (programming?.volumeAd || 90) / 100;
  adAudio.play();
  playing = true;
  document.getElementById('playBtn').textContent = '⏸';
  document.getElementById('vinyl').classList.add('spin');
  spotIndex++;

  // Después del spot, reproducir música
  adAudio.onended = () => {
    playMusic();
    scheduleAd(); // Programar el próximo anuncio
  };
}

/* RADIO */
window.setPreset = (url, name) => {
  document.getElementById('radioUrl').value = url;
  musicAudio.src = url;
  document.getElementById('trackName').textContent = name || 'Radio';
  document.getElementById('trackSrc').textContent = 'Stream de radio';
  curMode = 'radio';
  if(playing) musicAudio.play();
};

window.loadRadio = () => {
  const url = document.getElementById('radioUrl').value;
  if(!url) return;
  musicAudio.src = url;
  document.getElementById('trackName').textContent = 'Radio';
  document.getElementById('trackSrc').textContent = url.substring(0, 40);
  curMode = 'radio';
  if(playing) musicAudio.play();
};

/* FOLDER */
window.handleFiles = (e) => {
  musicFiles = Array.from(e.target.files);
  if(musicFiles.length > 0) {
    curTrack = 0;
    musicAudio.src = URL.createObjectURL(musicFiles[0]);
    document.getElementById('trackName').textContent = musicFiles[0].name;
    document.getElementById('trackSrc').textContent = `Carpeta local (${musicFiles.length} archivos)`;
    curMode = 'folder';
    if(playing) musicAudio.play();
  }
};

/* DRIVE */
window.loadDriveMusic = async (folderId) => {
  folderId = folderId || document.getElementById('musicFolderId').value || currentFolderId;
  if(!folderId) return;

  try {
    console.log('🎵 Cargando música desde Drive:', folderId);
    const response = await fetch(`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=files(id,name,mimeType)&key=${API_KEY}`);
    const data = await response.json();
    driveMusicFiles = data.files || [];
    document.getElementById('trackName').textContent = `Drive (${driveMusicFiles.length} archivos)`;
    document.getElementById('trackSrc').textContent = 'Cargando de Google Drive...';
    curMode = 'drive';
    if(driveMusicFiles.length > 0) {
      const fileId = driveMusicFiles[0].id;
      musicAudio.src = `https://drive.google.com/uc?export=download&id=${fileId}`;
      console.log('✅ Música cargada de Drive');
    }
  } catch(e) {
    console.error('Error loading Drive:', e);
  }
};

/* TABS */
window.switchTab = (tab) => {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.getElementById('tab-'+tab).classList.add('on');
  document.getElementById('panel-'+tab).classList.add('on');
};
</script>
</body>
</html>
